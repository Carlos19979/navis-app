services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@host.docker.internal:54322/postgres?sslmode=disable"
      SUPABASE_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      SUPABASE_URL: "http://host.docker.internal:54321"
      # Supabase local demo service_role key (public knowledge, local-only).
      # Needed by account deletion to purge storage buckets via the admin API.
      SUPABASE_SERVICE_ROLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU"
      LOG_LEVEL: "debug"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./apps/api:/app
