services:
  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: navis
      POSTGRES_PASSWORD: navis_dev_password
      POSTGRES_DB: navis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U navis"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://navis:navis_dev_password@postgres:5432/navis?sslmode=disable"
      SUPABASE_JWT_SECRET: "super-secret-jwt-token-with-at-least-32-characters-long"
      SUPABASE_URL: "http://localhost:54321"
      LOG_LEVEL: "debug"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app

volumes:
  postgres_data:
